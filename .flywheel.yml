flywheel:
  streams:
    - name: main-line
      branches:
        # develop is the prerelease channel: pushes cut v*-dev.N tags
        # via semantic-release. Merging develop → main triggers the
        # real release on main; the back-merge step in flywheel-push.yml
        # then replays the chore(release) commit + tag back into develop
        # so its tag ancestry stays in sync and the next dev cycle
        # computes versions from the most recent release.
        - name: develop
          release: prerelease
          suffix: dev
          auto_merge:
            - feat
            - fix
            - fix!
            - chore
            - refactor
            - perf
            - style
            - test
            - docs
            - ci
            - build
        - name: main
          release: production
          # Production releases publish only after release-gate.yml runs the
          # full e2e suite against the tagged SHA and calls the Update Release
          # API with draft: false. Holds the floating @vN tag (which fires on
          # release: published) behind a green e2e signal. See
          # §spec:release-gate.
          release_as_draft: true
          # Bumping types (feat/fix/fix!/perf) are intentionally absent: a
          # bumping promotion triggers semantic-release on main, which fires
          # release-gate.yml and consumes one ~300–500-call e2e run against
          # the shared sandbox installation. Auto-merging every bumping push
          # makes e2e cadence ≈ develop-push cadence, defeating the budget
          # savings §spec:sandbox-test-budget exists to capture. Non-bumping
          # types stay listed because semantic-release computes no version
          # bump for them and no release fires — they cost nothing to
          # auto-promote. See §spec:release-gate.
          auto_merge:
            - chore
            - refactor
            - style
            - test
            - docs
            - ci
            - build
