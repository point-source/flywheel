flywheel:
  streams:
    - name: main-line
      branches:
        # develop is the prerelease channel: pushes cut v*-dev.N tags
        # via semantic-release. Merging develop → main triggers the
        # real release on main; the back-merge step in flywheel-push.yml
        # then replays the chore(release) commit + tag back into develop
        # so its tag ancestry stays in sync and the next dev cycle
        # computes versions from the most recent release.
        - name: develop
          release: prerelease
          suffix: dev
          auto_merge:
            - feat
            - fix
            - fix!
            - chore
            - refactor
            - perf
            - style
            - test
            - docs
            - ci
            - build
        - name: main
          release: production
          # Production releases publish only after release-gate.yml runs the
          # full e2e suite against the tagged SHA and calls the Update Release
          # API with draft: false. Holds the floating @vN tag (which fires on
          # release: published) behind a green e2e signal. See
          # §spec:release-gate.
          release_as_draft: true
          auto_merge:
            - feat
            - fix
            - fix!
            - chore
            - refactor
            - perf
            - style
            - test
            - docs
            - ci
            - build
