# quality — example PR + merge-queue compatible quality check.
#
# This is a starter template, NOT a workflow Flywheel installs or invokes.
# Copy it to .github/workflows/quality.yml and replace the placeholder
# `your-test-script.sh` with your real test command(s).
#
# Why both pull_request AND merge_group:
#   If you register this workflow as a required status check on a branch
#   that uses GitHub's merge queue, the merge_group trigger is what fires
#   the check inside the queue. Without it, the queue stalls forever
#   waiting for a check that never runs against the merge group's
#   speculative commit.
#
# GitHub names a required status check after the JOB, not the workflow.
# The job id below (`quality`) is the check-run name you list in the ruleset
# under "Required status checks" — keep workflow name, job id, and the
# registered check name identical so they can't drift apart. Renaming the
# job means re-pointing every ruleset that references it.
name: quality
on:
  pull_request:
  merge_group:    # required for merge-queue compatibility
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      # Classify the triggering commit/PR. The classify action reads only
      # github.event — no checkout, no token, no API calls — and emits two
      # booleans:
      #   derived_release_commit  Flywheel's own `chore(release):` and
      #                           `chore: back-merge` commits, which carry no
      #                           new source and so no test signal.
      #   promotion_pr            the long-lived develop→main promotion PR.
      # Pin it to the same major as your main Flywheel action. It identifies
      # these shapes on Flywheel's side of the interface, so you don't hard-
      # code (and have to maintain) the commit-message patterns yourself.
      - id: classify
        uses: point-source/flywheel/classify@v1
      - uses: actions/checkout@v6
      # Skip the suite on commits/PRs that carry no test signal. A step-level
      # `if:` that evaluates false reports `success` to the required-status-
      # checks rule (per GitHub docs), so the `quality` check still clears the
      # gate without running tests.
      #
      # derived_release_commit is the uncontroversial skip — re-running tests
      # on a release/back-merge commit cannot change their verdict.
      # promotion_pr is optional and teams differ on it: the promotion PR
      # carries the batch of work being released, so some want it fully
      # exercised. Drop the promotion_pr clause to run the suite on it.
      # Reference:
      # https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/collaborating-on-repositories-with-code-quality-features/troubleshooting-required-status-checks#handling-skipped-but-required-checks
      #
      # No-action fallback — if you would rather not invoke the classify
      # action, match the shapes inline instead. You then own keeping these
      # patterns in sync with Flywheel's release pipeline (the classify
      # action exists precisely so you don't have to):
      #   if: |
      #     !startsWith(github.event.merge_group.head_commit.message || '', 'chore(release):') &&
      #     !startsWith(github.event.merge_group.head_commit.message || '', 'chore: back-merge') &&
      #     !contains(github.event.pull_request.title || '', ': promote ')
      - name: Test
        if: |
          steps.classify.outputs.derived_release_commit != 'true' &&
          steps.classify.outputs.promotion_pr != 'true'
        # Replace this with your real test invocation. If you have multiple
        # check types (lint, typecheck, unit, integration), it's fine to
        # split them into separate jobs in this same file — each becomes its
        # own required check named after its job id, so give each a stable id,
        # add its own classify step, and register that exact id in the ruleset.
        run: ./your-test-script.sh
