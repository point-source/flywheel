name: Flywheel — Push
on:
  push:
    branches: ["**"]
concurrency:
  group: flywheel-push-${{ github.ref_name }}
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # The single `point-source/flywheel@<ref>` pin governs every flywheel
      # file that runs: the dispatcher, the bundled scripts, and the
      # semantic-release plugin set all come from this ref. init.sh stamps
      # the ref from its --version flag (defaults to the latest released
      # major, e.g. @v2). See SPEC §spec:action-version-lockstep.
      - uses: point-source/flywheel@__FLYWHEEL_VERSION__
        with:
          event: push
          app-id: ${{ vars.FLYWHEEL_GH_APP_ID }}
          app-private-key: ${{ secrets.FLYWHEEL_GH_APP_PRIVATE_KEY }}
