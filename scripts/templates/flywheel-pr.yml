name: Flywheel — PR
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
jobs:
  conduct:
    uses: point-source/flywheel/.github/workflows/pr.yml@__FLYWHEEL_VERSION__
    with:
      app-id: ${{ vars.FLYWHEEL_GH_APP_ID }}
      # Run the Flywheel action at the same ref this caller pins the
      # reusable workflow at, so the action and the workflow stay in
      # lockstep. init.sh stamps both from --version (the latest major,
      # or whatever ref you passed).
      flywheel-version: __FLYWHEEL_VERSION__
    secrets:
      app-private-key: ${{ secrets.FLYWHEEL_GH_APP_PRIVATE_KEY }}
