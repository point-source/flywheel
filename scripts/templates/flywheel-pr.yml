name: Flywheel — PR
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
concurrency:
  group: flywheel-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  conduct:
    # Only run on 'edited' events when a human triggered the edit.
    # Bot-driven edits (the Flywheel App rewriting titles/bodies, push-flow
    # upserting promotion PR bodies) would otherwise flap conduct ↔ push-flow
    # writes on every promotion-source push.
    if: |
      github.event.pull_request.draft == false &&
      (github.event.action != 'edited' || github.event.sender.type == 'User')
    runs-on: ubuntu-latest
    # Normal runs use the App installation token for every write, so these
    # scopes only matter when app-private-key is empty (fork / Dependabot PRs):
    # then Flywheel posts the required flywheel/conventional-commit check with
    # this GITHUB_TOKEN instead of skipping, so the check doesn't deadlock the
    # PR. Dependabot-triggered runs honor this elevation; fork-PR tokens stay
    # read-only regardless and fall back to a manual merge.
    permissions:
      contents: read
      checks: write
      pull-requests: read
    steps:
      # The single `point-source/flywheel@<ref>` pin governs every flywheel
      # file that runs: the dispatcher, the bundled scripts, and the
      # semantic-release plugin set all come from this ref. init.sh stamps
      # the ref from its --version flag (defaults to the latest released
      # major, e.g. @v2). See SPEC §spec:action-version-lockstep.
      - uses: point-source/flywheel@__FLYWHEEL_VERSION__
        with:
          event: pull_request
          app-id: ${{ vars.FLYWHEEL_GH_APP_ID }}
          app-private-key: ${{ secrets.FLYWHEEL_GH_APP_PRIVATE_KEY }}
