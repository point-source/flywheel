flywheel:
  streams:
    - name: main-line
      branches:
        - name: develop
          release: prerelease
          suffix: dev
          auto_merge: [fix, fix!, feat, chore, refactor, perf, style, test, docs]
        - name: staging
          release: prerelease
          suffix: rc
          auto_merge: [fix, chore, style, test, docs]
        - name: main
          release: production
          auto_merge: []
  merge_strategy: squash
