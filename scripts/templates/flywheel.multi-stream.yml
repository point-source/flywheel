flywheel:
  streams:
    - name: main-line
      branches:
        - name: develop
          release: prerelease
          suffix: dev
          auto_merge: [fix, feat, chore]
        - name: main
          release: production
          auto_merge: []
    - name: customer-acme
      branches:
        - name: customer-acme
          release: prerelease
          suffix: acme
          auto_merge: [fix, fix!, chore]
  merge_strategy: squash
