name: Auto-merge
description: >-
  Either enable GitHub auto-merge (squash) on the PR, or add it to the merge
  queue if one is active on the target branch. Caller exports GH_TOKEN.
inputs:
  pr_number:
    description: PR number to merge
    required: true
  use_queue:
    description: 'true to enqueue, false to call the merge API directly'
    required: true
  merge_strategy:
    description: 'squash | merge | rebase (only used when use_queue=false)'
    required: false
    default: squash
  dry_run:
    description: 'true to log the action without performing it (used by smoke tests)'
    required: false
    default: 'false'
outputs:
  action:
    description: 'merged | enqueued | skipped'
    value: ${{ steps.merge.outputs.action }}
runs:
  using: composite
  steps:
    - id: merge
      shell: bash
      env:
        PR: ${{ inputs.pr_number }}
        QUEUE: ${{ inputs.use_queue }}
        STRATEGY: ${{ inputs.merge_strategy }}
        DRY_RUN: ${{ inputs.dry_run }}
      run: |
        set -euo pipefail

        if [[ "$DRY_RUN" == "true" ]]; then
          mode="merged"
          [[ "$QUEUE" == "true" ]] && mode="enqueued"
          echo "::notice::dry-run: would have ${mode} PR #${PR}"
          printf 'action=skipped\n' >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [[ "$QUEUE" == "true" ]]; then
          # Enqueue via GraphQL — REST does not expose a merge-queue add endpoint.
          pr_id=$(gh api graphql -f query='
            query($owner:String!,$repo:String!,$num:Int!) {
              repository(owner:$owner,name:$repo) {
                pullRequest(number:$num) { id }
              }
            }' -F owner="${GITHUB_REPOSITORY%/*}" \
                -F repo="${GITHUB_REPOSITORY#*/}" \
                -F num="$PR" --jq '.data.repository.pullRequest.id')
          gh api graphql -f query='
            mutation($pr:ID!) {
              enqueuePullRequest(input:{pullRequestId:$pr}) {
                mergeQueueEntry { position }
              }
            }' -F pr="$pr_id" >/dev/null
          printf 'action=enqueued\n' >> "$GITHUB_OUTPUT"
        else
          flag="--squash"
          case "$STRATEGY" in
            merge)  flag="--merge"  ;;
            rebase) flag="--rebase" ;;
          esac
          gh pr merge "$PR" "$flag" --auto --delete-branch
          printf 'action=merged\n' >> "$GITHUB_OUTPUT"
        fi
