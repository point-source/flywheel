name: Wait for run
description: >-
  Poll for the most recent workflow run of `workflow` on `branch` in `repo`
  to reach a terminal state. Exits non-zero if the run failed or did not
  complete within `timeout` seconds. Used by both pr-lifecycle (waiting on
  the adopter's quality workflow) and e2e (waiting on the sandbox's
  pipeline runs) so a single fix to the polling logic covers both.

inputs:
  repo:
    description: owner/name of the repo containing the workflow run
    required: true
  workflow:
    description: workflow filename (e.g. on-pr.yml) or display name
    required: true
  branch:
    description: branch name to filter on (matched via headBranch in the API output)
    required: true
  token:
    description: GH_TOKEN to authenticate the gh CLI
    required: true
  timeout:
    description: max seconds to wait for the run to complete
    required: false
    default: '600'

outputs:
  conclusion:
    description: 'Terminal conclusion of the matched run (success | failure | cancelled | …)'
    value: ${{ steps.wait.outputs.conclusion }}

runs:
  using: composite
  steps:
    - id: wait
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        REPO: ${{ inputs.repo }}
        WORKFLOW: ${{ inputs.workflow }}
        BRANCH: ${{ inputs.branch }}
        TIMEOUT: ${{ inputs.timeout }}
      run: |
        set -euo pipefail

        # gh's --branch flag (and the underlying actions/runs ?branch= API
        # param) returns empty for short-lived branches and recently
        # force-rewritten refs even when matching runs exist; post-filter
        # on headBranch instead.
        get_row() {
          gh run list --repo "$REPO" --workflow "$WORKFLOW" --limit 50 \
            --json databaseId,headBranch,status,conclusion \
            --jq "[.[] | select(.headBranch == \"$BRANCH\")] | .[0] // empty"
        }

        # Give the trigger a moment to register as a run before polling.
        sleep 5

        deadline=$((SECONDS + TIMEOUT))
        row=""

        while (( SECONDS < deadline )); do
          row=$(get_row)
          [[ -n "$row" ]] && break
          sleep 3
        done

        if [[ -z "$row" ]]; then
          echo "::error::no run found for $WORKFLOW on $BRANCH in $REPO after ${TIMEOUT}s"
          exit 1
        fi

        while (( SECONDS < deadline )); do
          row=$(get_row)
          status=$(jq -r '.status'     <<<"$row")
          concl=$( jq -r '.conclusion' <<<"$row")
          if [[ "$status" == "completed" ]]; then
            echo "conclusion=$concl" >> "$GITHUB_OUTPUT"
            echo "run concluded: $concl"
            [[ "$concl" == "success" ]] && exit 0 || exit 1
          fi
          sleep 5
        done

        echo "::error::$WORKFLOW on $BRANCH did not complete within ${TIMEOUT}s"
        exit 1
