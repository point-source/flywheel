name: Detect merge queue
description: >-
  Determine whether the target branch has a merge queue active. Honors the
  config override (`merge_queue: true|false|auto`); auto-detects via the GH
  rules API when the override is `auto`.
inputs:
  branch:
    description: Branch name to check
    required: true
  override:
    description: 'auto | true | false (from .pipeline.yml)'
    required: false
    default: auto
outputs:
  enabled:
    description: 'true|false — should the orchestrator enqueue rather than merge'
    value: ${{ steps.detect.outputs.enabled }}
runs:
  using: composite
  steps:
    - id: detect
      shell: bash
      env:
        BRANCH: ${{ inputs.branch }}
        OVERRIDE: ${{ inputs.override }}
      run: |
        set -euo pipefail
        case "$OVERRIDE" in
          true)  printf 'enabled=true\n'  >> "$GITHUB_OUTPUT"; exit 0 ;;
          false) printf 'enabled=false\n' >> "$GITHUB_OUTPUT"; exit 0 ;;
        esac

        # auto-detect: query the rules for the branch and look for merge_queue.
        # The endpoint returns an empty array if no rules apply. We surface
        # API errors as a workflow warning rather than swallowing them — false
        # is still the safe default per spec.md, but failing closed without a
        # log line hides token misconfig.
        if [[ -z "${GH_TOKEN:-}" ]]; then
          echo "::warning::detect-merge-queue: GH_TOKEN not set; cannot auto-detect, defaulting to false"
          printf 'enabled=false\n' >> "$GITHUB_OUTPUT"
          exit 0
        fi
        err=$(mktemp)
        if rules=$(gh api "repos/$GITHUB_REPOSITORY/rules/branches/$BRANCH" 2>"$err"); then
          if jq -e 'any(.[]; .type == "merge_queue")' <<<"$rules" >/dev/null 2>&1; then
            printf 'enabled=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'enabled=false\n' >> "$GITHUB_OUTPUT"
          fi
        else
          echo "::warning::detect-merge-queue: gh api failed; defaulting to false. stderr: $(tr '\n' ' ' <"$err")"
          printf 'enabled=false\n' >> "$GITHUB_OUTPUT"
        fi
