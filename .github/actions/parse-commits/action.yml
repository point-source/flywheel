name: Parse commits
description: >-
  Parse conventional commits from a git log range into a JSON array.
  Outputs a `commits_json` file path (for large payloads) and a `bump` level.
inputs:
  range:
    description: 'git log range, e.g. v1.2.3..HEAD or origin/main..HEAD'
    required: true
  reject_invalid:
    description: Fail the step if any commit does not match the conventional format
    required: false
    default: 'false'
outputs:
  commits_json_path:
    description: Path to the JSON file containing the parsed commits
    value: ${{ steps.run.outputs.path }}
  bump:
    description: 'major | minor | patch | none'
    value: ${{ steps.run.outputs.bump }}
  invalid_count:
    description: Number of commits that did not match the conventional format
    value: ${{ steps.run.outputs.invalid_count }}
runs:
  using: composite
  steps:
    - id: run
      shell: bash
      env:
        RANGE: ${{ inputs.range }}
        REJECT: ${{ inputs.reject_invalid }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        # github.action_path points at the composite action; scripts/ lives
        # at the repo root of the orchestrator, two levels up.
        scripts="$ACTION_PATH/../../../scripts"
        out=$(mktemp)
        "$scripts/commit-parse.sh" "$RANGE" > "$out"
        invalid=$(jq '[.[] | select(.valid == false)] | length' "$out")
        bump=$("$scripts/version-bump.sh" "$out")

        printf 'path=%s\n' "$out" >> "$GITHUB_OUTPUT"
        printf 'bump=%s\n' "$bump" >> "$GITHUB_OUTPUT"
        printf 'invalid_count=%s\n' "$invalid" >> "$GITHUB_OUTPUT"

        if [[ "$REJECT" == "true" && "$invalid" -gt 0 ]]; then
          echo "::error::$invalid commit(s) do not match the conventional format"
          jq -r '.[] | select(.valid == false) | "  - " + (.sha[0:7]) + " " + .description' "$out" >&2
          exit 1
        fi
