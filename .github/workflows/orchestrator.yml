# Orchestrator: top-level dispatcher.
# Adopting repos call this from on-pr.yml and on-push.yml. Routes to
# pr-lifecycle / promote / release based on event_type and target_branch.

name: pipeline / orchestrator

on:
  workflow_call:
    inputs:
      event_type:
        description: 'pr_opened | pr_updated | pr_merged | push'
        type: string
        required: true
      source_branch:
        type: string
        required: true
      target_branch:
        type: string
        required: true
      pr_number:
        type: number
        required: false
        default: 0
      dry_run:
        description: Smoke-test mode — surface up the merge gate without acting
        type: boolean
        required: false
        default: false
      # Pass-through to the called workflows so they can side-load swarmflow's
      # composite actions. `github.workflow_ref` always points at the entry
      # workflow (the adopter's on-pr/on-push), not at the reusable workflow
      # that's currently executing — so we can't introspect this and instead
      # take it as input. Defaults match the canonical install; adopters
      # who fork must override these to match their `@<ref>` pin.
      swarmflow_repo:
        type: string
        required: false
        default: point-source/swarmflow
      swarmflow_ref:
        type: string
        required: false
        default: v1
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  pr-lifecycle:
    if: inputs.event_type == 'pr_opened' || inputs.event_type == 'pr_updated'
    uses: ./.github/workflows/pr-lifecycle.yml
    with:
      pr_number: ${{ inputs.pr_number }}
      source_branch: ${{ inputs.source_branch }}
      target_branch: ${{ inputs.target_branch }}
      dry_run: ${{ inputs.dry_run }}
      swarmflow_repo: ${{ inputs.swarmflow_repo }}
      swarmflow_ref: ${{ inputs.swarmflow_ref }}
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  promote:
    if: inputs.event_type == 'push' && inputs.source_branch != 'main'
    uses: ./.github/workflows/promote.yml
    with:
      source_branch: ${{ inputs.source_branch }}
      swarmflow_repo: ${{ inputs.swarmflow_repo }}
      swarmflow_ref: ${{ inputs.swarmflow_ref }}
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}

  release:
    if: inputs.event_type == 'push' && inputs.source_branch == 'main'
    uses: ./.github/workflows/release.yml
    with:
      swarmflow_repo: ${{ inputs.swarmflow_repo }}
      swarmflow_ref: ${{ inputs.swarmflow_ref }}
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
