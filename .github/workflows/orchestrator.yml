# Orchestrator: top-level dispatcher for the swarmflow pipeline.
# Adopting repos call this from on-pr.yml and on-push.yml. Routes to the
# pr-lifecycle / promote / release command based on event_type and source_branch.
#
# Reusable. Called from adopter entrypoints via:
#   uses: point-source/swarmflow/.github/workflows/orchestrator.yml@v1
#
# All command dispatch happens inside ONE job with step-level `if:` filters.
# This is intentional: per-job filtering reports SKIPPED check_runs on the
# PR, which GitHub treats as making `mergeStateStatus: UNSTABLE`. UNSTABLE
# in turn blocks `enablePullRequestAutoMerge` ("Pull request is in unstable
# status"). Step-level filtering produces NO check_runs for the unmatched
# branches, so the PR sees a single check that completes cleanly.

name: pipeline / orchestrator

on:
  workflow_call:
    inputs:
      event_type:
        description: 'pr_opened | pr_updated | pr_merged | push'
        type: string
        required: true
      source_branch:
        type: string
        required: true
      target_branch:
        type: string
        required: true
      pr_number:
        type: number
        required: false
        default: 0
      dry_run:
        description: Smoke-test mode — surface up the merge gate without acting
        type: boolean
        required: false
        default: false
      # `swarmflow_repo` and `swarmflow_ref` let our own e2e test a non-`v1`
      # SHA. `uses:` cannot take expressions, so an external override is the
      # only escape hatch. Adopters should never need to set these. See
      # docs/adr/0001-typescript-rewrite.md for full rationale.
      swarmflow_repo:
        type: string
        required: false
        default: point-source/swarmflow
      swarmflow_ref:
        type: string
        required: false
        default: v1
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

# Union of permissions across all command paths. Adopter templates must
# grant this same union (eager workflow_call validation, learning #9).
permissions:
  actions: write
  checks: write
  contents: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Side-load swarmflow at the pinned ref
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.swarmflow_repo }}
          ref: ${{ inputs.swarmflow_ref }}
          path: .swarmflow

      - name: Run pr-lifecycle command
        if: inputs.event_type == 'pr_opened' || inputs.event_type == 'pr_updated'
        uses: ./.swarmflow
        with:
          command: pr-lifecycle
          pr_number: ${{ inputs.pr_number }}
          source_branch: ${{ inputs.source_branch }}
          target_branch: ${{ inputs.target_branch }}
          dry_run: ${{ inputs.dry_run }}
          app_id: ${{ secrets.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run promote command
        if: inputs.event_type == 'push' && inputs.source_branch != 'main'
        uses: ./.swarmflow
        with:
          command: promote
          branch: ${{ inputs.source_branch }}
          app_id: ${{ secrets.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run release command
        if: inputs.event_type == 'push' && inputs.source_branch == 'main'
        uses: ./.swarmflow
        with:
          command: release
          branch: main
          app_id: ${{ secrets.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
