# Smoke test: end-to-end exercise of the orchestrator's PR-lifecycle path
# against a synthetic fixture commit on this repo. Runs in dry-run mode so no
# actual PR is merged.
#
# Triggered manually (workflow_dispatch) or weekly. Not part of CI gating.

name: Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1'   # Mondays 14:00 UTC

permissions:
  contents: read
  pull-requests: write

jobs:
  smoke-pr-lifecycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Synthesize a fixture commit on a throwaway branch
        run: |
          set -euo pipefail
          git config user.email smoke@swarmflow.test
          git config user.name  swarmflow-smoke
          git checkout -b "smoke/$GITHUB_RUN_ID"
          touch .smoke-fixture
          git add .smoke-fixture
          git commit -m "chore: smoke test fixture"

      - name: Run parse-commits over the fixture
        id: parse
        uses: ./.github/actions/parse-commits
        with:
          range: HEAD~1..HEAD

      - name: Render PR body for the fixture
        uses: ./.github/actions/render-pr-body
        with:
          commits_json_path: ${{ steps.parse.outputs.commits_json_path }}
          bump: ${{ steps.parse.outputs.bump }}
          target: develop
          mode: feature
          checks: 'smoke'

      - name: Confirm bump was 'none'
        run: |
          [[ "${{ steps.parse.outputs.bump }}" == "none" ]] || {
            echo "::error::expected bump=none for chore-only fixture, got '${{ steps.parse.outputs.bump }}'"
            exit 1
          }
