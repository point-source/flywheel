name: Flywheel — PR
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
concurrency:
  group: flywheel-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  conduct:
    # Only run on 'edited' events when a human triggered the edit.
    # Bot-driven edits (the Flywheel App rewriting titles/bodies, push-flow
    # upserting promotion PR bodies) would otherwise flap conduct ↔ push-flow
    # writes on every promotion-source push.
    if: |
      github.event.pull_request.draft == false &&
      (github.event.action != 'edited' || github.event.sender.type == 'User')
    runs-on: ubuntu-latest
    steps:
      # `uses: ./` resolves against the calling workflow's workspace, so the
      # action source has to be on disk before the composite is invoked. For
      # an adopter this checkout is implicit (GitHub fetches the action when
      # they pin `point-source/flywheel@<ref>`); the dogfood needs it
      # explicit so it can exercise the composite against the source under
      # review on every PR. See SPEC §spec:action-version-lockstep.
      - uses: actions/checkout@v6
      - uses: ./
        with:
          event: pull_request
          app-id: ${{ vars.FLYWHEEL_GH_APP_ID }}
          app-private-key: ${{ secrets.FLYWHEEL_GH_APP_PRIVATE_KEY }}
