name: Flywheel — PR
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]
jobs:
  conduct:
    uses: ./.github/workflows/pr.yml
    with:
      app-id: ${{ vars.FLYWHEEL_GH_APP_ID }}
      flywheel-ref: ${{ github.sha }}
    secrets:
      app-private-key: ${{ secrets.FLYWHEEL_GH_APP_PRIVATE_KEY }}
