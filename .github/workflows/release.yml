# Release: fired on push to main.
# Computes the final release version, creates an annotated tag and GitHub
# Release, updates CHANGELOG.md, and triggers the production build.
#
# Reusable. Called by orchestrator.yml.
#
# Phase 1.5: dispatches `command: hello-world` to validate the architecture.
# Phase 2e will swap to `command: release`.

name: pipeline / release

on:
  workflow_call:
    inputs:
      swarmflow_repo:
        type: string
        required: false
        default: point-source/swarmflow
      swarmflow_ref:
        type: string
        required: false
        default: v1
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Side-load swarmflow at the pinned ref
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.swarmflow_repo }}
          ref: ${{ inputs.swarmflow_ref }}
          path: .swarmflow

      - name: Run release command
        uses: ./.swarmflow
        with:
          command: hello-world
          branch: main
          app_id: ${{ secrets.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
