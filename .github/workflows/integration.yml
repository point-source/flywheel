name: Integration tests
on:
  pull_request:
  push:
    branches: ["develop", "main"]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    # Skip on PRs from forks: the App secrets are not exposed to fork PRs
    # and the suite would skip every test anyway. Save the CI minutes.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci

      # Mint a short-lived installation token from the flywheel-build-e2e
      # GitHub App, scoped to point-source/flywheel-sandbox only.
      # Required secrets in this repo:
      #   FLYWHEEL_E2E_APP_ID          — flywheel-build-e2e App ID
      #   FLYWHEEL_E2E_APP_PRIVATE_KEY — flywheel-build-e2e App private key (PEM)
      - name: Mint sandbox installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.FLYWHEEL_E2E_APP_ID }}
          private-key: ${{ secrets.FLYWHEEL_E2E_APP_PRIVATE_KEY }}
          owner: point-source
          repositories: flywheel-sandbox

      - name: Run integration tests
        env:
          SANDBOX_GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npm run test:integration
