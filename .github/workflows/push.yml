name: Flywheel — Push (reusable)
# Reusable workflow holding the canonical push-event logic: the action,
# semantic-release with pinned plugin majors, the @-mention sanitizer
# (#73), and the back-merge loop (#74). Adopters pin
# `point-source/flywheel/.github/workflows/push.yml@v<major>` from a thin
# caller; fixes propagate via the floating major tag. See issue #84.
on:
  workflow_call:
    inputs:
      app-id:
        description: Numeric GitHub App ID (vars.FLYWHEEL_GH_APP_ID).
        required: true
        type: string
    secrets:
      app-private-key:
        description: PEM-format private key (secrets.FLYWHEEL_GH_APP_PRIVATE_KEY).
        required: true
concurrency:
  group: flywheel-push-${{ github.ref_name }}
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Don't persist the workflow's default GITHUB_TOKEN as a git
          # extraheader — it would shadow the App installation token that
          # semantic-release embeds in its push URL, and the workflow's
          # token only has read scope here.
          persist-credentials: false
      # Pinned to this release's exact version. The literal below is the
      # trunk source-of-truth (`@v<major>` before the first templated
      # release, `@v<exact>` after); semantic-release sed-bumps the line
      # to `@v${nextRelease.version}` during the release commit via the
      # release_files entry in .flywheel.yml. The chore(release) commit
      # — and therefore the tag created at it — references the matching
      # action SHA, so pinning .../push.yml@v<exact> also pins the action.
      # See issue #166.
      - uses: point-source/flywheel@v1
        id: flywheel
        with:
          event: push
          app-id: ${{ inputs.app-id }}
          app-private-key: ${{ secrets.app-private-key }}
      - name: Run semantic-release
        if: steps.flywheel.outputs.managed_branch == 'true'
        # Plugins must be co-installed; npx will not resolve them from the
        # generated .releaserc.json on its own.
        run: |
          npx --yes \
            -p semantic-release@24 \
            -p @semantic-release/commit-analyzer@13 \
            -p @semantic-release/release-notes-generator@14 \
            -p @semantic-release/changelog@6 \
            -p @semantic-release/exec@7 \
            -p @semantic-release/git@10 \
            -p @semantic-release/github@11 \
            semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.flywheel.outputs.token }}
      - name: Sanitize @-mentions in release body
        # Squash-commit messages often contain @-prefixed identifiers
        # (@semantic-release/exec, @v1 floating tag, @octokit/auth-app, …)
        # that GitHub's release-page renderer parses as user mentions and
        # surfaces in the release's "Contributors" sidebar — adding bogus
        # entries like a "v1" contributor. Wrap any @-mention left in the
        # body with backticks so GitHub leaves it as code text. See #70.
        if: steps.flywheel.outputs.managed_branch == 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.flywheel.outputs.token }}
        # Logic lives in scripts/sanitize-release-mentions.sh so it's
        # lintable (shellcheck in CI) and integration-testable
        # (tests/sanitize-release-mentions.test.ts). The inline form
        # halted the 1.1.1 release on a transient 404 race between
        # `git push --tags` and the release-by-tag lookup; the script
        # adds retry-with-backoff to close that window. See #130.
        #
        # `scripts_dir` is an absolute path the action exports back to
        # its own scripts/ directory on the runner. A bare `bash
        # scripts/sanitize-release-mentions.sh` would run against the
        # adopter's checkout (which doesn't have the script) and exit
        # 127. See #134.
        run: bash "${{ steps.flywheel.outputs.scripts_dir }}/sanitize-release-mentions.sh"
      - name: Register Flywheel merge drivers
        # Registers the flywheel-changelog and flywheel-release-file git
        # merge drivers and writes .git/info/attributes so release
        # back-merges of derived artifacts (CHANGELOG.md, release_files
        # paths) auto-resolve instead of hitting the #112 conflict.
        if: steps.flywheel.outputs.managed_branch == 'true'
        shell: bash
        # Logic lives in scripts/register-merge-drivers.sh so it's
        # lintable (shellcheck in CI) and unit-tested
        # (tests/register-merge-drivers.test.ts). The driver string was
        # silently broken once (#119); a typo here disables the driver
        # and every back-merge conflicts — extracted from inline YAML in
        # #133 to close that hole.
        #
        # Invoked via the action's `scripts_dir` output (absolute path).
        # A bare `bash scripts/register-merge-drivers.sh` would run
        # against the adopter's checkout, which doesn't have the script,
        # and exit 127. See the sanitize / back-merge steps and #134.
        run: bash "${{ steps.flywheel.outputs.scripts_dir }}/register-merge-drivers.sh"
      - name: Back-merge release into upstream branches
        # Only runs when this push triggered a release (a tag was created at
        # HEAD by semantic-release) and the stream has upstream branches.
        # Replays main's chore(release) commit + tag into each upstream via a
        # true `git merge` so ancestry is preserved and the next prerelease
        # cycle computes from a synced state. We deliberately do *not* mark
        # the back-merge commit `[skip ci]`: that token is a workflow-level
        # filter, which would leave required status checks `Pending` on any
        # promotion PR tracking the upstream branch. Adopters who want to
        # skip CI work on back-merge commits should use a job-level `if:` in
        # their quality workflows (which reports `success` and clears the
        # gate).
        #
        # On unexpected conflict (the merge drivers should make CHANGELOG
        # and release_files conflict-free, so a failure here means a real
        # source divergence) we don't push the conflicted state to the
        # protected upstream branch. We commit the markers on a throwaway
        # branch and open a flywheel:needs-review PR instead — the previous
        # behavior was to exit non-zero and stall silently until the next
        # promotion surfaced the divergence (#112).
        if: |
          steps.flywheel.outputs.managed_branch == 'true' &&
          steps.flywheel.outputs.back_merge_targets != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.flywheel.outputs.token }}
          BACK_MERGE_TARGETS: ${{ steps.flywheel.outputs.back_merge_targets }}
          RELEASED_BRANCH: ${{ github.ref_name }}
        # Logic lives in scripts/back-merge.sh so it's lintable (shellcheck
        # in CI) and integration-testable (tests/back-merge.test.ts) end-to-
        # end with stubbed gh + a real local git remote. Three of four
        # production-halting back-merge bugs (#112, #119, #128) lived in
        # the inline shell that this step used to be — extracted in #128
        # to close that hole.
        #
        # Invoked via the action's `scripts_dir` output (absolute path).
        # See the sanitize step above and #134 for why this can't be a
        # relative `bash scripts/back-merge.sh` in the reusable workflow.
        run: bash "${{ steps.flywheel.outputs.scripts_dir }}/back-merge.sh"
