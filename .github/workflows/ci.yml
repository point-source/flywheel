# Self-CI for swarmflow.
# Runs on PRs against any branch and on push to rewrite/typescript or main.
# Validates: lint, typecheck, unit tests, build, dist freshness.

name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - rewrite/typescript

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      # Fails if dist/ is stale relative to src/. The pre-commit hook should
      # have caught this, but --no-verify bypasses hooks — this is the
      # backstop. Covers index.js, index.js.map, licenses.txt.
      - name: Verify dist/ is fresh
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is stale — run 'npm run build' and commit the result"
            exit 1
          fi
