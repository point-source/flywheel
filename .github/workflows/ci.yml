# Self-CI for swarmflow.
# Lints the workflow YAML and shell scripts and runs the bats unit suite.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          bash <(curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          mv ./actionlint /usr/local/bin/actionlint

      - name: Run actionlint
        run: actionlint -color

      - name: Run shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck scripts/*.sh

      - name: Validate example pipeline.yml
        run: |
          sudo snap install yq 2>/dev/null || sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq -e '.pipeline.branches.develop' templates/pipeline.yml.example > /dev/null
          yq -e '.pipeline.merge_strategy'   templates/pipeline.yml.example > /dev/null
          yq -e '.pipeline.auto_merge_types' templates/pipeline.yml.example > /dev/null

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats jq

      - name: Run bats suite
        run: bats tests/bats/
