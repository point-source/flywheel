# PR lifecycle: validate commits, render PR title/body, run quality checks,
# and (if eligible) auto-merge or enqueue.
#
# Reusable. Called by orchestrator.yml; do not call directly.

name: pipeline / pr-lifecycle

on:
  workflow_call:
    inputs:
      pr_number:
        type: number
        required: true
      source_branch:
        type: string
        required: true
      target_branch:
        type: string
        required: true
      dry_run:
        description: Smoke/test mode — skip the actual merge call
        type: boolean
        required: false
        default: false
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: token
        uses: ./.github/actions/app-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: cfg
        uses: ./.github/actions/load-config

      # Conventional-commit format is the gating contract — fail early so the
      # required check turns red and merge is blocked at the ruleset level.
      - id: parse
        uses: ./.github/actions/parse-commits
        with:
          range: origin/${{ inputs.target_branch }}..HEAD
          reject_invalid: 'true'

      # Decide auto-merge eligibility BEFORE writing the PR body so the body
      # reflects the decision.
      - id: eligibility
        shell: bash
        env:
          COMMITS: ${{ steps.parse.outputs.commits_json_path }}
          ALLOWED: ${{ steps.cfg.outputs.auto_merge_types_json }}
        run: |
          set -euo pipefail
          # Eligible iff every commit is in the allowlist AND no breaking change.
          breaking=$(jq 'any(.[]; .breaking == true)' "$COMMITS")
          types=$(jq -c '[.[] | .type] | unique' "$COMMITS")
          all_allowed=$(jq -n --argjson t "$types" --argjson a "$ALLOWED" \
            '($t | all(. as $x | $a | index($x) != null))')
          if [[ "$breaking" == "true" || "$all_allowed" != "true" ]]; then
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "reason=human-review" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=true" >> "$GITHUB_OUTPUT"
            echo "reason=auto-merge" >> "$GITHUB_OUTPUT"
          fi

      - id: render
        uses: ./.github/actions/render-pr-body
        with:
          commits_json_path: ${{ steps.parse.outputs.commits_json_path }}
          bump: ${{ steps.parse.outputs.bump }}
          target: ${{ inputs.target_branch }}
          mode: feature
          checks: pending

      - name: Update PR title and body
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR: ${{ inputs.pr_number }}
          TITLE: ${{ steps.render.outputs.title }}
          BODY: ${{ steps.render.outputs.body_path }}
        run: |
          gh pr edit "$PR" --title "$TITLE" --body-file "$BODY"

      # Quality gate: dispatch the adopter's quality workflow if configured.
      # We invoke via workflow_dispatch + wait, rather than workflow_call,
      # because the adopter's workflow file path is dynamic per repo.
      - name: Run quality checks
        id: quality
        if: steps.cfg.outputs.workflows_quality != ''
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          QWF: ${{ steps.cfg.outputs.workflows_quality }}
          PR: ${{ inputs.pr_number }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          # Trigger and wait for completion. The quality workflow is expected
          # to accept (pr_number, sha) inputs and exit non-zero on failure.
          gh workflow run "$QWF" --ref "${{ inputs.source_branch }}" \
            -f pr_number="$PR" -f sha="$SHA"
          # Poll for the run to complete (5 min cap).
          for _ in $(seq 1 60); do
            sleep 5
            run=$(gh run list --workflow "$QWF" --branch "${{ inputs.source_branch }}" \
                    --limit 1 --json status,conclusion,databaseId \
                    --jq '.[0]')
            status=$(jq -r '.status' <<<"$run")
            if [[ "$status" == "completed" ]]; then
              concl=$(jq -r '.conclusion' <<<"$run")
              echo "result=$concl" >> "$GITHUB_OUTPUT"
              [[ "$concl" == "success" ]] || exit 1
              exit 0
            fi
          done
          echo "::error::quality workflow timed out"
          exit 1

      - name: Auto-merge
        if: steps.eligibility.outputs.eligible == 'true'
        id: queue_check
        uses: ./.github/actions/detect-merge-queue
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        with:
          branch: ${{ inputs.target_branch }}
          override: ${{ steps.cfg.outputs.merge_queue }}

      - name: Merge or enqueue
        if: steps.eligibility.outputs.eligible == 'true'
        uses: ./.github/actions/auto-merge
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        with:
          pr_number: ${{ inputs.pr_number }}
          use_queue: ${{ steps.queue_check.outputs.enabled }}
          merge_strategy: ${{ steps.cfg.outputs.merge_strategy }}
          dry_run: ${{ inputs.dry_run }}

      - name: Mark ready for review
        if: steps.eligibility.outputs.eligible != 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR: ${{ inputs.pr_number }}
        run: |
          gh pr comment "$PR" --body \
            ":eyes: Ready for human review — change type requires approval before merge."
