# PR lifecycle: validate commits, render PR title/body, run quality checks,
# and (if eligible) auto-merge or enqueue.
#
# Reusable. Called by orchestrator.yml; do not call directly.

name: pipeline / pr-lifecycle

on:
  workflow_call:
    inputs:
      pr_number:
        type: number
        required: true
      source_branch:
        type: string
        required: true
      target_branch:
        type: string
        required: true
      dry_run:
        type: boolean
        required: false
        default: false
      swarmflow_repo:
        type: string
        required: false
        default: point-source/swarmflow
      swarmflow_ref:
        type: string
        required: false
        default: v1
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Side-load swarmflow at the pinned ref
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.swarmflow_repo }}
          ref: ${{ inputs.swarmflow_ref }}
          path: .swarmflow

      - name: Run pr-lifecycle command
        uses: ./.swarmflow
        with:
          command: pr-lifecycle
          pr_number: ${{ inputs.pr_number }}
          source_branch: ${{ inputs.source_branch }}
          target_branch: ${{ inputs.target_branch }}
          dry_run: ${{ inputs.dry_run }}
          app_id: ${{ secrets.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
