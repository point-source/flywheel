name: Flywheel — Push
on:
  push:
    branches: ["**"]
concurrency:
  group: flywheel-push-${{ github.ref_name }}
  cancel-in-progress: false
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # `uses: ./` resolves against the calling workflow's workspace, so the
      # action source has to be on disk before the composite is invoked. For
      # an adopter this checkout is implicit (GitHub fetches the action when
      # they pin `point-source/flywheel@<ref>`); the dogfood needs it
      # explicit so it can exercise the composite against the source under
      # review on every push. The composite re-runs actions/checkout with
      # fetch-depth: 0 + persist-credentials: false against the same repo
      # (here, flywheel itself plays the adopter role), so it doesn't
      # matter that the first checkout used the workflow's default token.
      # See SPEC §spec:action-version-lockstep.
      - uses: actions/checkout@v6
      - uses: ./
        with:
          event: push
          app-id: ${{ vars.FLYWHEEL_GH_APP_ID }}
          app-private-key: ${{ secrets.FLYWHEEL_GH_APP_PRIVATE_KEY }}
