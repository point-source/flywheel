name: E2E tests
on:
  push:
    branches: ["develop"]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.repository.fork == false }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci

      # Mint a short-lived installation token from the flywheel-build-e2e
      # GitHub App, scoped to point-source/flywheel-sandbox only.
      - name: Mint sandbox installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.FLYWHEEL_E2E_APP_ID }}
          private-key: ${{ secrets.FLYWHEEL_E2E_APP_PRIVATE_KEY }}
          owner: point-source
          repositories: flywheel-sandbox

      # Close stranded open PRs from any prior cancelled run before mutating
      # the sandbox. Required because cancel-in-progress: true above means an
      # afterEach teardown can be killed mid-run, leaving open PRs behind.
      - name: Sandbox presweep
        env:
          SANDBOX_GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: node scripts/sandbox-presweep.mjs

      # Overwrite the sandbox's workflow files + .flywheel.yml with the
      # versions on the SHA under test. Treats the sandbox as a fresh-install
      # target so template drift cannot mask regressions. Each commit carries
      # [skip ci] to keep the sandbox's own Flywheel — Push from retriggering.
      - name: Sync sandbox fixtures
        env:
          SANDBOX_GH_TOKEN: ${{ steps.app-token.outputs.token }}
          FLYWHEEL_ACTION_REF: ${{ github.sha }}
        run: node scripts/sync-e2e-fixtures.mjs

      - name: Pre-flight (doctor.sh against sandbox)
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        # The previous step already proved the App credentials work by
        # minting an installation token; doctor's listing checks would
        # only fail with 403 under that token (App installation tokens
        # cannot list Variables or Secrets), so skip them.
        run: ./scripts/doctor.sh --skip-credentials point-source/flywheel-sandbox

      - name: Run e2e suite
        env:
          SANDBOX_GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: npm run test:e2e
