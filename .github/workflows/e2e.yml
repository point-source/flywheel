# End-to-end integration test.
#
# Drives a sandbox repo (not this one) through the full pipeline:
#   pr-lifecycle → promote → release.
#
# Idempotent by construction:
#   - every resource is namespaced with $GITHUB_RUN_ID
#   - pre-run cleanup wipes stale e2e-* state from prior runs
#   - teardown runs on success AND failure
#   - the sandbox's managed branches are force-reset to the `e2e-baseline`
#     tag before each run, giving a deterministic starting state
#
# Prerequisites and setup: see docs/E2E.md.

name: E2E

on:
  workflow_dispatch:
    inputs:
      sandbox_repo:
        description: 'owner/name of the sandbox repo. Defaults to vars.E2E_SANDBOX_REPO.'
        type: string
        required: false
      ref:
        description: 'swarmflow ref to test (branch/tag/SHA). Defaults to this workflow run.'
        type: string
        required: false

permissions:
  contents: read

# Serialize e2e runs against a given sandbox — parallel runs would trample
# each other's baseline resets. Do NOT cancel in-progress; teardown must run.
concurrency:
  group: e2e-${{ inputs.sandbox_repo || vars.E2E_SANDBOX_REPO }}
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      SANDBOX: ${{ inputs.sandbox_repo || vars.E2E_SANDBOX_REPO }}
      REF: ${{ inputs.ref || github.sha }}
      RUN_NS: e2e-${{ github.run_id }}
      BASELINE_TAG: e2e-baseline
    steps:
      - uses: actions/checkout@v4

      - id: split_sandbox
        run: |
          echo "owner=${SANDBOX%%/*}" >> "$GITHUB_OUTPUT"
          echo "name=${SANDBOX##*/}" >> "$GITHUB_OUTPUT"

      - id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.E2E_APP_ID }}
          private-key: ${{ secrets.E2E_APP_PRIVATE_KEY }}
          # The e2e App is installed on the sandbox, not on swarmflow itself.
          # Scope the token to the sandbox repo.
          owner: ${{ steps.split_sandbox.outputs.owner }}
          repositories: ${{ steps.split_sandbox.outputs.name }}

      - name: Clone sandbox
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${SANDBOX}.git" sandbox
          cd sandbox
          git config user.email "swarmflow-e2e[bot]@users.noreply.github.com"
          git config user.name  "swarmflow-e2e[bot]"

      # --- Pre-run cleanup: idempotency guard ---------------------------------
      # All deletes are `|| true` so the first run (nothing to clean) works.
      - name: Pre-run cleanup
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        working-directory: sandbox
        run: |
          set -euo pipefail

          # Close any leftover e2e-* PRs
          gh pr list --repo "$SANDBOX" --state open --search "head:e2e-" \
            --json number --jq '.[].number' \
            | xargs -I{} gh pr close --repo "$SANDBOX" {} --delete-branch || true

          # Delete leftover e2e-* branches (in case a PR was already merged)
          git ls-remote --heads origin 'e2e-*' \
            | awk '{print $2}' | sed 's|refs/heads/||' \
            | xargs -I{} git push origin --delete {} || true

          # Delete leftover pre-release + e2e tags and their GitHub releases.
          # Globs must match teardown's so a killed prior run can't leave dev/rc
          # tags behind that survive into the next run.
          for tag in $(git ls-remote --tags origin 'v*-dev.*' 'v*-rc.*' 'v*-e2e*' \
                       | awk '{print $2}' | sed 's|refs/tags/||'); do
            gh release delete "$tag" --repo "$SANDBOX" --cleanup-tag --yes || true
          done

          # Reset managed branches to the baseline tag
          git fetch origin --tags
          for br in develop staging main; do
            git push origin "+refs/tags/${BASELINE_TAG}:refs/heads/${br}" || true
          done

      # --- Pin sandbox entrypoints to the swarmflow ref under test ------------
      - name: Pin entrypoints to swarmflow@${{ env.REF }}
        working-directory: sandbox
        env:
          SF_REPO: ${{ github.repository }}
          SF_REF: ${{ env.REF }}
        run: |
          set -euo pipefail
          git checkout main
          # Copy the latest templates from THIS swarmflow checkout, so e2e
          # always tests against the templates an adopter would copy today
          # (permissions blocks, schema changes, etc.) rather than against
          # a frozen baseline that drifts behind. The baseline therefore
          # only needs to bootstrap branches; its workflow content is moot.
          cp ../templates/on-pr.yml   .github/workflows/on-pr.yml
          cp ../templates/on-push.yml .github/workflows/on-push.yml
          # Rewrite the orchestrator @ref to the swarmflow ref under test.
          sed -i -E \
            "s|[a-zA-Z][-a-zA-Z0-9]*/swarmflow/\.github/workflows/orchestrator\.yml@[^[:space:]]+|${SF_REPO}/.github/workflows/orchestrator.yml@${SF_REF}|" \
            .github/workflows/on-pr.yml .github/workflows/on-push.yml
          # Inject swarmflow_repo / swarmflow_ref so reusable workflows side-load
          # this exact ref. Adopter templates omit these (they use the @v1 default);
          # see docs/adr/0001-typescript-rewrite.md for why the override exists.
          for wf in .github/workflows/on-pr.yml .github/workflows/on-push.yml; do
            yq -i '.jobs.orchestrate.with.swarmflow_repo = strenv(SF_REPO) | .jobs.orchestrate.with.swarmflow_ref = strenv(SF_REF)' "$wf"
          done
          git add -A
          git commit -m "chore: pin swarmflow to ${REF} for ${RUN_NS}" || true
          git push origin main
          # pull_request events read on-pr.yml from the *base* branch and
          # push events from the pushed branch — so develop and staging need
          # the same pinned entrypoints, otherwise they still load the
          # baseline content and the pipeline can't start.
          git push origin --force main:develop main:staging

      # --- Fixture 1: fix PR → develop (auto-merge eligible) -----------------
      # Should: rewrite PR title to canonical, run quality (no-op without
      # quality workflow configured), enable auto-merge → land on develop →
      # promote dispatches build + tags v*-dev.*.
      - name: 'Fixture 1: open fix PR to develop'
        id: fix
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        working-directory: sandbox
        run: |
          set -euo pipefail
          br="${RUN_NS}-fix"
          git checkout -b "$br" origin/develop
          printf '%s\n' "$RUN_NS" > "fix-${RUN_NS}.txt"
          git add "fix-${RUN_NS}.txt"
          git commit -m "fix: e2e auto-merge ${RUN_NS}"
          git push origin "$br"
          url=$(gh pr create --repo "$SANDBOX" \
                  --base develop --head "$br" \
                  --title "raw title to be rewritten" \
                  --body "raw body to be rewritten")
          echo "pr=$(basename "$url")" >> "$GITHUB_OUTPUT"
          echo "branch=$br" >> "$GITHUB_OUTPUT"

      - name: Wait for pr-lifecycle on fix PR
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          REPO: ${{ env.SANDBOX }}
          WORKFLOW: on-pr.yml
          BRANCH: ${{ steps.fix.outputs.branch }}
          TIMEOUT: '600'
        run: ./scripts/e2e/wait-run.sh

      - name: Assert fix PR title was rewritten to canonical
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          set -euo pipefail
          title=$(gh pr view --repo "$SANDBOX" "${{ steps.fix.outputs.pr }}" --json title --jq .title)
          [[ "$title" == "fix: e2e auto-merge ${RUN_NS}" ]] || {
            echo "::error::expected canonical title, got: $title"
            exit 1
          }

      # --- Fixture 2: chore-only push → develop (learning #3) ----------------
      # Should: NO version tag, but build IS dispatched (publish_on_develop=true
      # by default). Verifies promote.ts:hasChanges=false branch.
      - name: 'Fixture 2: push chore-only to develop'
        id: chore
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        working-directory: sandbox
        run: |
          set -euo pipefail
          br="${RUN_NS}-chore"
          git checkout -b "$br" origin/develop
          printf '%s\n' "$RUN_NS chore" > "chore-${RUN_NS}.txt"
          git add "chore-${RUN_NS}.txt"
          git commit -m "chore: e2e chore-only ${RUN_NS}"
          git push origin "$br"
          url=$(gh pr create --repo "$SANDBOX" \
                  --base develop --head "$br" \
                  --title "chore: e2e chore-only ${RUN_NS}" \
                  --body "chore-only fixture (learning #3)")
          echo "pr=$(basename "$url")" >> "$GITHUB_OUTPUT"
          echo "branch=$br" >> "$GITHUB_OUTPUT"

      - name: Wait for pr-lifecycle on chore PR
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          REPO: ${{ env.SANDBOX }}
          WORKFLOW: on-pr.yml
          BRANCH: ${{ steps.chore.outputs.branch }}
          TIMEOUT: '600'
        run: ./scripts/e2e/wait-run.sh

      - name: Wait for promote on develop after chore merge
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          REPO: ${{ env.SANDBOX }}
          WORKFLOW: on-push.yml
          BRANCH: develop
          TIMEOUT: '600'
        run: ./scripts/e2e/wait-run.sh

      - name: Assert no v*-dev tag was created for the chore-only push
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        working-directory: sandbox
        run: |
          set -euo pipefail
          git fetch origin --tags
          # The chore commit is on develop; if learning #3 holds, no tag
          # should have been created for it. List tags reachable from
          # develop's tip and ensure none are dev-tags namespaced to this run.
          tags=$(git tag --points-at origin/develop -l 'v*-dev.*' || true)
          if [[ -n "$tags" ]]; then
            echo "::error::chore-only push created a tag (learning #3 violated): $tags"
            exit 1
          fi
          echo "::notice::chore-only push correctly created no tag"

      # --- Fixture 3: invalid conventional-commit PR --------------------------
      # Should: required check fails (parseCommitsStrict throws), no auto-merge.
      - name: 'Fixture 3: open PR with invalid commit message'
        id: invalid
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        working-directory: sandbox
        run: |
          set -euo pipefail
          br="${RUN_NS}-invalid"
          git checkout -b "$br" origin/develop
          printf '%s\n' "$RUN_NS invalid" > "invalid-${RUN_NS}.txt"
          git add "invalid-${RUN_NS}.txt"
          git commit -m "update foo without a conventional type"
          git push origin "$br"
          url=$(gh pr create --repo "$SANDBOX" \
                  --base develop --head "$br" \
                  --title "update foo" \
                  --body "invalid-commit fixture")
          echo "pr=$(basename "$url")" >> "$GITHUB_OUTPUT"
          echo "branch=$br" >> "$GITHUB_OUTPUT"

      - name: Wait for pr-lifecycle on invalid PR (expects FAILURE)
        id: invalid_run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          REPO: ${{ env.SANDBOX }}
          WORKFLOW: on-pr.yml
          BRANCH: ${{ steps.invalid.outputs.branch }}
          TIMEOUT: '600'
        run: ./scripts/e2e/wait-run.sh

      - name: Assert invalid PR run failed (gates the required check)
        run: |
          set -euo pipefail
          if [[ "${{ steps.invalid_run.outcome }}" != "failure" ]]; then
            echo "::error::invalid-commit PR run did not fail; pr-lifecycle should have rejected non-conventional commits"
            exit 1
          fi
          echo "::notice::invalid-commit PR correctly failed pr-lifecycle"

      # --- Teardown: unconditional ------------------------------------------
      - name: Teardown
        if: always()
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        working-directory: sandbox
        run: |
          set +e

          # Close any still-open PRs from this run
          gh pr list --repo "$SANDBOX" --state open --search "head:${RUN_NS}" \
            --json number --jq '.[].number' \
            | xargs -I{} gh pr close --repo "$SANDBOX" {} --delete-branch

          # Delete branches created by this run
          git ls-remote --heads origin "${RUN_NS}*" \
            | awk '{print $2}' | sed 's|refs/heads/||' \
            | xargs -I{} git push origin --delete {}

          # Delete tags + releases created during this run
          git fetch origin --tags --prune --prune-tags
          for tag in $(git tag -l 'v*-dev.*' 'v*-rc.*' 'v*-e2e*'); do
            gh release delete "$tag" --repo "$SANDBOX" --cleanup-tag --yes
          done

          # Reset managed branches back to the baseline tag
          for br in develop staging main; do
            git push origin "+refs/tags/${BASELINE_TAG}:refs/heads/${br}"
          done

          exit 0
