name: Release — float major tag
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  float:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      - name: Move floating major tag
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          # Accept both "v1.2.3" (primary stream) and "stream-name/v1.2.3" (scoped stream).
          if [[ "$TAG_NAME" =~ ^(.*)v([0-9]+)\.[0-9]+\.[0-9]+$ ]]; then
            PREFIX="${BASH_REMATCH[1]}"
            MAJOR="${PREFIX}v${BASH_REMATCH[2]}"
          else
            echo "::notice::Release tag '$TAG_NAME' is not in vX.Y.Z (or stream/vX.Y.Z) form — skipping major-tag float."
            exit 0
          fi
          echo "Floating ${MAJOR} → ${TAG_NAME}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" "$TAG_NAME" -m "Float ${MAJOR} to ${TAG_NAME}"
          git push origin "$MAJOR" --force
