name: Release — float major tag
on:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  float:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.FLYWHEEL_GH_APP_ID }}
          private-key: ${{ secrets.FLYWHEEL_GH_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Move floating major tag
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        # Logic lives in scripts/release-major-tag.sh so the tag-name
        # parsing is shellchecked in CI and unit-tested
        # (tests/release-major-tag.test.ts) — extracted from inline YAML
        # in #133. Unlike the reusable push.yml (#134), this workflow
        # only ever runs in flywheel's own checkout, so a plain relative
        # path resolves the script.
        run: bash scripts/release-major-tag.sh
