name: Flywheel — PR (reusable)
# Reusable workflow holding the canonical PR-event logic. Adopters pin
# `point-source/flywheel/.github/workflows/pr.yml@v<major>` from a thin
# caller; bug fixes and template tightening land here and propagate via
# the floating major tag without an adopter PR. See issue #84.
on:
  workflow_call:
    inputs:
      app-id:
        description: Numeric GitHub App ID (vars.FLYWHEEL_GH_APP_ID).
        required: true
        type: string
      flywheel-version:
        # The git ref to check the Flywheel action source out at. The
        # caller template (scripts/templates/flywheel-pr.yml) passes the
        # same ref it pinned this reusable workflow at, so the action SHA
        # stays in lockstep with the workflow tag without the workflow
        # having to name its own ref — github.workflow_ref only ever
        # holds the *caller's* ref, which is absent from
        # point-source/flywheel for any non-default-branch caller and so
        # broke the runtime-resolution approach (#180, #183).
        #
        # Defaults to the floating major `v1` so callers that omit the
        # input keep working (non-breaking) and track the latest v1
        # release. The major is the one literal that needs no per-release
        # stamping; passing an exact `@vX.Y.Z` from the caller pins the
        # action to that tag. Removed when the v2 composite action lands
        # (see SPEC §spec:action-version-lockstep, "Interim delivery").
        description: Flywheel git ref to run the action at (default v1).
        required: false
        type: string
        default: v1
    secrets:
      app-private-key:
        description: PEM-format private key (secrets.FLYWHEEL_GH_APP_PRIVATE_KEY).
        required: true
concurrency:
  group: flywheel-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true
jobs:
  conduct:
    # Only run on 'edited' events when a human triggered the edit.
    # Bot-driven edits (the Flywheel App rewriting titles/bodies, push-flow
    # upserting promotion PR bodies) would otherwise flap conduct ↔ push-flow
    # writes on every promotion-source push.
    if: |
      github.event.pull_request.draft == false &&
      (github.event.action != 'edited' || github.event.sender.type == 'User')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Check the Flywheel action source out at the ref the caller pinned.
      # The caller template passes `flywheel-version` equal to the ref it
      # pinned this reusable workflow at, keeping the action SHA in
      # lockstep with the workflow tag. See the `flywheel-version` input
      # description above and SPEC §spec:action-version-lockstep.
      - uses: actions/checkout@v6
        with:
          repository: point-source/flywheel
          ref: ${{ inputs.flywheel-version }}
          path: _flywheel
      - uses: ./_flywheel
        with:
          event: pull_request
          app-id: ${{ inputs.app-id }}
          app-private-key: ${{ secrets.app-private-key }}
