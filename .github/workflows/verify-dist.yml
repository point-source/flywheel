name: Verify dist
on:
  pull_request:
  push:
    branches: ["**"]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Flywheel's own chore(release) and back-merge commits change only the
      # version stamp and changelog — never src/ — so typecheck, unit tests,
      # and the bundle rebuild cannot reach a different verdict on them.
      # Classify them so the work steps below skip while the job still
      # reports a successful no-op. See §spec:release-ci-budget.
      - name: Classify commit
        id: classify
        uses: ./classify

      # Doc-only changes (docs/, root *.md, .github/ISSUE_TEMPLATE/) cannot
      # affect the dist/ bundle, so the rebuild step is skipped on those
      # PRs. Unit tests still run — tests/docs-examples.test.ts validates
      # YAML snippets in docs and catches regressions a doc-only change
      # might introduce. Filtering happens in-job so the check still
      # reports the required-check name as success; workflow-level
      # paths-ignore would omit the check entirely. See
      # §spec:sandbox-test-budget.
      #
      # non_docs is true iff at least one changed file is NOT a doc path.
      # predicate-quantifier: 'every' requires a file to match every
      # pattern (with negations) before counting — so non_docs == 'true'
      # precisely when a non-doc file changed. A PR mixing doc and
      # non-doc changes runs the rebuild as normal.
      - name: Detect non-doc changes
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          predicate-quantifier: 'every'
          filters: |
            non_docs:
              - '**'
              - '!docs/**'
              - '!*.md'
              - '!.github/ISSUE_TEMPLATE/**'

      # All work steps below skip on a flywheel-produced release/back-merge
      # commit (derived_release_commit). Unit tests still run on doc-only PRs
      # — those are human commits, not derived — so tests/docs-examples.test.ts
      # keeps catching doc-YAML regressions; only flywheel's own release
      # commits short-circuit the suite.
      - uses: actions/setup-node@v4
        if: steps.classify.outputs.derived_release_commit != 'true'
        with:
          node-version: "24"
      - run: npm ci
        if: steps.classify.outputs.derived_release_commit != 'true'
      - run: npm run typecheck
        if: steps.classify.outputs.derived_release_commit != 'true'
      - run: npm test
        if: steps.classify.outputs.derived_release_commit != 'true'
        # tests/init.test.ts skips when `gh auth status` fails; pass the
        # workflow's default token so it runs in CI. Default GITHUB_TOKEN
        # has contents:read only, so init.sh's `gh api PATCH delete_branch_on_merge`
        # call fails silently — that's the desired no-side-effect behavior.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Rebuild bundle and check for drift
        if: steps.filter.outputs.non_docs == 'true' && steps.classify.outputs.derived_release_commit != 'true'
        run: |
          npm run build
          if ! git diff --exit-code -- core/dist/; then
            echo "::error::core/dist/ is out of sync with source. Run 'npm run build' and commit the result."
            exit 1
          fi
