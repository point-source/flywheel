name: Verify dist
on:
  pull_request:
  push:
    branches: ["**"]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Rebuild bundle and check for drift
        run: |
          npm run build
          if ! git diff --exit-code -- dist/; then
            echo "::error::dist/ is out of sync with source. Run 'npm run build' and commit the result."
            exit 1
          fi
