# Promotion: fired on push to develop or staging.
# 1. Compute the next pre-release version for this branch.
# 2. Optionally trigger build + publish for the branch's environment.
# 3. Determine the next active branch in the chain (develop->staging->main,
#    skipping disabled).
# 4. Upsert a promotion PR from this branch to the next.
#
# Reusable. Called by orchestrator.yml.

name: pipeline / promote

on:
  workflow_call:
    inputs:
      source_branch:
        type: string
        required: true
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: token
        uses: ./.github/actions/app-token
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - id: cfg
        uses: ./.github/actions/load-config

      - id: version
        uses: ./.github/actions/compute-version
        with:
          branch: ${{ inputs.source_branch }}
          initial_version: ${{ steps.cfg.outputs.initial_version }}

      # Build + publish for this environment if the adopter opted in.
      # Per spec.md:438-440, chore-only pushes still publish if publish_on_*
      # is true; the difference is that no new version tag is created.
      # compute-version emits a -dev.N/-rc.N version regardless of bump.
      - name: Decide whether to publish on this branch
        id: publish_decision
        env:
          BRANCH: ${{ inputs.source_branch }}
          DEV: ${{ steps.cfg.outputs.publish_on_develop }}
          STG: ${{ steps.cfg.outputs.publish_on_staging }}
        run: |
          set -euo pipefail
          publish=false
          case "$BRANCH" in
            develop) [[ "$DEV" == "true" ]] && publish=true ;;
            staging) [[ "$STG" == "true" ]] && publish=true ;;
          esac
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "environment=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Trigger build
        if: steps.publish_decision.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          BUILD_WF: ${{ steps.cfg.outputs.workflows_build }}
          PUBLISH_WF: ${{ steps.cfg.outputs.workflows_publish }}
          VERSION: ${{ steps.version.outputs.version }}
          ENVIRONMENT: ${{ steps.publish_decision.outputs.environment }}
          CHANGELOG: ${{ steps.version.outputs.changelog_path }}
          BRANCH: ${{ inputs.source_branch }}
        run: |
          set -euo pipefail
          # Read changelog into a single-line-friendly form for workflow_dispatch.
          # The build workflow can re-fetch the artifact later if it needs the
          # raw markdown; we pass only what fits in workflow_dispatch inputs.
          gh workflow run "$BUILD_WF" --ref "$BRANCH" \
            -f version="$VERSION" \
            -f environment="$ENVIRONMENT" \
            -f changelog="$(head -c 60000 "$CHANGELOG")" \
            -f artifact_path="dist/"
          # The build workflow is expected to chain into the publish workflow
          # itself on success — we do NOT poll for completion here, to keep the
          # promote job short. Adopters who want different sequencing can wire
          # their own dependency.
          echo "::notice::Dispatched $BUILD_WF for $VERSION (environment=$ENVIRONMENT)"

      # Determine the next active branch in the promotion chain.
      - id: next
        env:
          BRANCH: ${{ inputs.source_branch }}
          STG_ON: ${{ steps.cfg.outputs.branches_staging }}
          MAIN_ON: ${{ steps.cfg.outputs.branches_main }}
        run: |
          set -euo pipefail
          next=""
          case "$BRANCH" in
            develop)
              if [[ "$STG_ON" == "true" ]]; then
                next="staging"
              elif [[ "$MAIN_ON" == "true" ]]; then
                next="main"
              fi
              ;;
            staging)
              [[ "$MAIN_ON" == "true" ]] && next="main"
              ;;
          esac
          echo "branch=$next" >> "$GITHUB_OUTPUT"

      # Parse the cumulative set of commits pending promotion (everything on
      # source that isn't yet on next). This drives the promotion PR body.
      - name: Parse pending commits
        if: steps.next.outputs.branch != ''
        id: pending
        uses: ./.github/actions/parse-commits
        with:
          range: origin/${{ steps.next.outputs.branch }}..origin/${{ inputs.source_branch }}

      - name: Render promotion PR body
        if: steps.next.outputs.branch != ''
        id: render
        uses: ./.github/actions/render-pr-body
        with:
          commits_json_path: ${{ steps.pending.outputs.commits_json_path }}
          bump: ${{ steps.pending.outputs.bump }}
          target: ${{ steps.next.outputs.branch }}
          mode: promotion
          version: ${{ steps.version.outputs.version }}

      - name: Upsert promotion PR
        if: steps.next.outputs.branch != ''
        uses: ./.github/actions/upsert-pr
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        with:
          head: ${{ inputs.source_branch }}
          base: ${{ steps.next.outputs.branch }}
          title: "chore(release): promote ${{ inputs.source_branch }} → ${{ steps.next.outputs.branch }} [v${{ steps.version.outputs.version }}]"
          body_path: ${{ steps.render.outputs.body_path }}
