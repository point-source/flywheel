# Promotion: fired on push to develop or staging.
# Computes the next pre-release version, optionally triggers build/publish,
# and upserts a promotion PR to the next active branch in the chain.
#
# Reusable. Called by orchestrator.yml; do not call directly.

name: pipeline / promote

on:
  workflow_call:
    inputs:
      source_branch:
        type: string
        required: true
      swarmflow_repo:
        type: string
        required: false
        default: point-source/swarmflow
      swarmflow_ref:
        type: string
        required: false
        default: v1
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Side-load swarmflow at the pinned ref
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.swarmflow_repo }}
          ref: ${{ inputs.swarmflow_ref }}
          path: .swarmflow

      - name: Run promote command
        uses: ./.swarmflow
        with:
          command: promote
          branch: ${{ inputs.source_branch }}
          app_id: ${{ secrets.APP_ID }}
          app_private_key: ${{ secrets.APP_PRIVATE_KEY }}
