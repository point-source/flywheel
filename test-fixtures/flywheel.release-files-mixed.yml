flywheel:
  streams:
    - name: main-line
      branches:
        - { name: main, release: production, auto_merge: [] }
  release_files:
    - path: pubspec.yaml
      pattern: '^version: .*'
      replacement: 'version: ${version}+${build}'
    - path: pyproject.toml
      cmd: 'python scripts/bump.py "${version}"'
  merge_strategy: squash
