flywheel:
  streams:
    - name: main-line
      branches:
        - name: develop
          release: none
          auto_merge:
            - fix
            - fix!
            - feat
            - chore
            - refactor
            - perf
            - style
            - test
            - docs
        - name: staging
          release: prerelease
          suffix: rc
          auto_merge:
            - fix
            - chore
            - style
            - test
            - docs
        - name: main
          release: production
          auto_merge: []
    - name: customer-acme
      branches:
        - name: customer-acme
          release: prerelease
          suffix: acme
          auto_merge:
            - fix
            - fix!
            - chore
  merge_strategy: squash
