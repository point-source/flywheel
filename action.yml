name: Flywheel
description: GitHub Actions-native CI/CD orchestration for teams and AI agent swarms.
author: point-source
branding:
  icon: rotate-cw
  color: blue
inputs:
  event:
    description: "Event to handle: 'pull_request' or 'push'."
    required: true
  app-id:
    description: "GitHub App ID (numeric). Typically supplied via secrets.FLYWHEEL_GH_APP_ID."
    required: true
  app-private-key:
    description: "GitHub App private key in PEM format. Typically supplied via secrets.FLYWHEEL_GH_APP_PRIVATE_KEY."
    required: true
outputs:
  token:
    description: "Minted installation token (masked). Pass to downstream steps that need it (e.g. semantic-release)."
  managed_branch:
    description: "'true' when the pushed/targeted branch is in a stream in .flywheel.yml; 'false' otherwise."
runs:
  using: node24
  main: dist/index.cjs
