name: Flywheel
description: GitHub Actions-native CI/CD orchestration for teams and AI agent swarms.
author: point-source
branding:
  icon: rotate-cw
  color: blue
# Composite action. The single `uses: point-source/flywheel@<ref>` in an
# adopter's workflow checks this action's repository out at <ref>, and
# every step below runs from that ref — the bundled JS dispatcher
# (core/dist/index.cjs), the bundled `scripts/`, and the semantic-release
# invocation alike, all addressed via `${{ github.action_path }}` (the
# absolute path to this action's own checkout on the runner). There is no
# second version surface for an adopter to keep in sync. See SPEC
# §spec:action-version-lockstep and §spec:composite-self-reference.
inputs:
  event:
    description: "Event to handle: 'pull_request' or 'push'."
    required: true
  app-id:
    description: "GitHub App ID (numeric). Typically supplied via vars.FLYWHEEL_GH_APP_ID (a repo Variable, not a Secret — the App ID is not sensitive)."
    required: true
  app-private-key:
    description: "GitHub App private key in PEM format. Typically supplied via secrets.FLYWHEEL_GH_APP_PRIVATE_KEY. Required for normal runs; empty on fork PRs (GitHub does not pass secrets to fork PR workflows) — the action exits cleanly with a notice in that case."
    required: false
outputs:
  token:
    description: "Minted installation token (masked). Pass to downstream steps that need it (e.g. semantic-release)."
    value: ${{ steps.core.outputs.token }}
  managed_branch:
    description: "'true' when the pushed branch should run semantic-release; 'false' otherwise (branch not in a stream, or branch has release: none)."
    value: ${{ steps.core.outputs.managed_branch }}
  back_merge_targets:
    description: "Comma-separated list of upstream branches in the same stream that should receive a back-merge after this branch releases. Empty when there are no upstream branches (single-branch stream, or this is the head of its stream)."
    value: ${{ steps.core.outputs.back_merge_targets }}
runs:
  using: composite
  steps:
    # Check the adopter's repository out into the runner's working
    # directory. `fetch-depth: 0` is required for semantic-release on
    # push events (it walks tag history), and is harmless on
    # pull_request events. `persist-credentials: false` prevents the
    # workflow's default GITHUB_TOKEN from being persisted as a git
    # extraheader — that header would shadow the App installation token
    # that semantic-release embeds in its push URL, and the default token
    # has read-only scope here anyway.
    - name: Checkout adopter repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        persist-credentials: false

    # Dispatch by event type. A `uses: ./…` reference inside a composite
    # resolves against GITHUB_WORKSPACE (the adopter's checked-out repo),
    # NOT this action's own checkout — so the dispatcher is invoked by its
    # absolute path under `${{ github.action_path }}` instead, exactly as
    # the release-script steps below address scripts/. This keeps the
    # dispatcher, scripts/, and the semantic-release plugin set all on the
    # one ref the adopter pinned — no second version surface. The node
    # entrypoint reads its inputs from the INPUT_* env vars that
    # @actions/core's getInput resolves, and writes step outputs to
    # $GITHUB_OUTPUT, so `steps.core.outputs.*` works just as it did when
    # this was a nested node action. setup-node pins the runtime to the
    # version the bundle is built for (esbuild target node24). See SPEC
    # §spec:action-version-lockstep and §spec:composite-self-reference.
    - name: Set up Node.js for the dispatcher
      uses: actions/setup-node@v5
      with:
        node-version: 24
    - name: Run Flywheel dispatcher
      id: core
      shell: bash
      env:
        INPUT_EVENT: ${{ inputs.event }}
        INPUT_APP-ID: ${{ inputs.app-id }}
        INPUT_APP-PRIVATE-KEY: ${{ inputs.app-private-key }}
        # The workflow's own GITHUB_TOKEN. Used only when app-private-key is
        # empty (fork / Dependabot PRs) to post the flywheel/conventional-commit
        # check so a required check doesn't deadlock the PR — see the empty-key
        # branch in core/src/main.ts. The flywheel-pr.yml template grants this
        # token `checks: write`. Normal runs use the App installation token and
        # ignore this entirely.
        INPUT_GITHUB-TOKEN: ${{ github.token }}
      run: node "${{ github.action_path }}/core/dist/index.cjs"

    - name: Run semantic-release
      # Plugins must be co-installed; npx will not resolve them from the
      # generated .releaserc.json on its own.
      if: inputs.event == 'push' && steps.core.outputs.managed_branch == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.core.outputs.token }}
      run: |
        npx --yes \
          -p semantic-release@24 \
          -p @semantic-release/commit-analyzer@13 \
          -p @semantic-release/release-notes-generator@14 \
          -p @semantic-release/changelog@6 \
          -p @semantic-release/exec@7 \
          -p @semantic-release/git@10 \
          -p @semantic-release/github@11 \
          semantic-release

    - name: Sanitize @-mentions in release body
      # Squash-commit messages often contain @-prefixed identifiers
      # (@semantic-release/exec, @v1 floating tag, @octokit/auth-app, …)
      # that GitHub's release-page renderer parses as user mentions and
      # surfaces in the release's "Contributors" sidebar — adding bogus
      # entries like a "v1" contributor. Wrap any @-mention left in the
      # body with backticks so GitHub leaves it as code text. See #70.
      #
      # Logic lives in scripts/sanitize-release-mentions.sh so it's
      # lintable (shellcheck in CI) and integration-testable
      # (tests/sanitize-release-mentions.test.ts). The inline form
      # halted the 1.1.1 release on a transient 404 race between
      # `git push --tags` and the release-by-tag lookup; the script
      # adds retry-with-backoff to close that window. See #130.
      #
      # `${{ github.action_path }}` is GitHub Actions' built-in absolute
      # path to this composite action's own checkout on the runner; it
      # locates the bundled scripts/ without an action output. See SPEC
      # §spec:action-version-lockstep.
      if: inputs.event == 'push' && steps.core.outputs.managed_branch == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.core.outputs.token }}
      run: bash "${{ github.action_path }}/scripts/sanitize-release-mentions.sh"

    - name: Register Flywheel merge drivers
      # Registers the flywheel-changelog and flywheel-release-file git
      # merge drivers and writes .git/info/attributes so release
      # back-merges of derived artifacts (CHANGELOG.md, release_files
      # paths) auto-resolve instead of hitting the #112 conflict.
      #
      # Logic lives in scripts/register-merge-drivers.sh so it's
      # lintable (shellcheck in CI) and unit-tested
      # (tests/register-merge-drivers.test.ts). The driver string was
      # silently broken once (#119); a typo here disables the driver
      # and every back-merge conflicts — extracted from inline YAML in
      # #133 to close that hole.
      if: inputs.event == 'push' && steps.core.outputs.managed_branch == 'true'
      shell: bash
      run: bash "${{ github.action_path }}/scripts/register-merge-drivers.sh"

    - name: Back-merge release into upstream branches
      # Only runs when this push triggered a release (a tag was created at
      # HEAD by semantic-release) and the stream has upstream branches.
      # Replays main's chore(release) commit + tag into each upstream via a
      # true `git merge` so ancestry is preserved and the next prerelease
      # cycle computes from a synced state. We deliberately do *not* mark
      # the back-merge commit `[skip ci]`: that token is a workflow-level
      # filter, which would leave required status checks `Pending` on any
      # promotion PR tracking the upstream branch. Adopters who want to
      # skip CI work on back-merge commits should use a job-level `if:` in
      # their quality workflows (which reports `success` and clears the
      # gate).
      #
      # On unexpected conflict (the merge drivers should make CHANGELOG
      # and release_files conflict-free, so a failure here means a real
      # source divergence) we don't push the conflicted state to the
      # protected upstream branch. We commit the markers on a throwaway
      # branch and open a flywheel:needs-review PR instead — the previous
      # behavior was to exit non-zero and stall silently until the next
      # promotion surfaced the divergence (#112).
      #
      # Logic lives in scripts/back-merge.sh so it's lintable (shellcheck
      # in CI) and integration-testable (tests/back-merge.test.ts) end-to-
      # end with stubbed gh + a real local git remote. Three of four
      # production-halting back-merge bugs (#112, #119, #128) lived in
      # the inline shell that this step used to be — extracted in #128
      # to close that hole.
      if: |
        inputs.event == 'push' &&
        steps.core.outputs.managed_branch == 'true' &&
        steps.core.outputs.back_merge_targets != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.core.outputs.token }}
        BACK_MERGE_TARGETS: ${{ steps.core.outputs.back_merge_targets }}
        RELEASED_BRANCH: ${{ github.ref_name }}
      run: bash "${{ github.action_path }}/scripts/back-merge.sh"
