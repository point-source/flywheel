name: Flywheel
description: GitHub Actions-native CI/CD orchestration for teams and AI agent swarms.
author: point-source
branding:
  icon: rotate-cw
  color: blue
inputs:
  event:
    description: "Event to handle: 'pull_request' or 'push'."
    required: true
  token:
    description: "GitHub App installation token (typically minted via actions/create-github-app-token) with repo + PR write."
    required: true
outputs:
  managed_branch:
    description: "'true' when the pushed/targeted branch is in a stream in .flywheel.yml; 'false' otherwise."
runs:
  using: node24
  main: dist/index.js
